<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StakeStone - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for StakeStone DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://stakestone-app.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7F2EA;
  --bg-2:#FBF8F2;
  --surface:#FFFFFF;
  --inset:#F4EFE6;
  --ink:#171512;
  --muted:#665F55;
  --faint:#9B9184;
  --accent:#C8A86B;
  --accent-soft:rgba(200,168,107,.18);
  --line:rgba(33,29,24,.10);
  --line-strong:rgba(33,29,24,.16);
  --shadow:0 28px 70px -38px rgba(57,47,33,.48), 0 8px 24px -18px rgba(57,47,33,.26);
}

*{box-sizing:border-box}
html,body{height:100%}
html{overflow-x:hidden}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  background:
    radial-gradient(70% 44% at 50% -12%, rgba(200,168,107,.20), transparent 62%),
    linear-gradient(180deg,var(--bg-2) 0%,var(--bg) 100%);
  display:flex;
  flex-direction:column;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,p{margin:0}
h1{line-height:1.04;letter-spacing:0}

.topbar{
  flex:none;
  width:100%;
  display:flex;
  align-items:center;
  gap:18px;
  padding:18px clamp(18px,4vw,42px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  font-size:1.05rem;
  font-weight:800;
}

.brand img{
  width:30px;
  height:30px;
  border-radius:9px;
  box-shadow:0 0 0 1px var(--line);
  flex:none;
}

.nav{
  display:flex;
  align-items:center;
  gap:26px;
  margin-left:12px;
  white-space:nowrap;
}

.nav a{
  color:var(--muted);
  font-size:.92rem;
  font-weight:560;
  transition:color .16s ease;
}

.nav a:hover{color:var(--ink)}
.sp{flex:1}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 17px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,255,255,.48);
  color:var(--ink);
  font-size:.9rem;
  font-weight:760;
  box-shadow:0 10px 24px -20px rgba(33,29,24,.55);
  transition:transform .16s ease,border-color .16s ease,background .16s ease;
}

.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(200,168,107,.52);
  background:#fff;
}

.stage{
  flex:1;
  min-height:0;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px clamp(18px,4vw,42px) 8px;
}

.hero{
  width:min(720px,100%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.hero h1{
  font-size:clamp(3.05rem,6.4vw,5.05rem);
  font-weight:820;
}

.sub{
  max-width:50ch;
  margin-top:14px;
  color:var(--muted);
  font-size:clamp(1rem,1.6vw,1.2rem);
}

.sub strong{
  color:var(--ink);
  font-weight:800;
  box-shadow:inset 0 -.48em 0 var(--accent-soft);
}

.card{
  width:min(560px,100%);
  margin-top:30px;
  padding:20px;
  border:1px solid var(--line);
  border-radius:24px;
  background:linear-gradient(180deg,#fff 0%,#FFFEFB 100%);
  box-shadow:var(--shadow);
}

.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:14px;
  text-align:left;
}

.card-title{
  color:var(--ink);
  font-size:.95rem;
  font-weight:820;
}

.badge{
  min-width:0;
  color:var(--ink);
  border:1px solid rgba(200,168,107,.38);
  background:var(--accent-soft);
  border-radius:999px;
  padding:6px 10px;
  font-size:.74rem;
  font-weight:780;
  line-height:1.1;
  white-space:normal;
}

.route{
  display:flex;
  align-items:stretch;
  gap:12px;
}

.leg{
  flex:1;
  min-width:0;
  padding:14px 15px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--inset);
  text-align:left;
}

.lbl{
  display:block;
  color:var(--faint);
  font-size:.69rem;
  font-weight:820;
  letter-spacing:.08em;
  line-height:1;
  text-transform:uppercase;
}

.chip{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  margin-top:10px;
}

.ic{
  width:28px;
  height:28px;
  border-radius:50%;
  flex:none;
}

.token{
  min-width:0;
  overflow-wrap:anywhere;
  color:var(--ink);
  font-size:1.08rem;
  font-weight:840;
  line-height:1.1;
}

.dir{
  flex:none;
  align-self:center;
  width:42px;
  height:42px;
  display:grid;
  place-items:center;
  border:1px solid var(--line-strong);
  border-radius:50%;
  background:#fff;
  color:var(--muted);
  cursor:pointer;
  box-shadow:0 12px 28px -22px rgba(33,29,24,.58);
  transition:transform .16s ease,color .16s ease,border-color .16s ease,background .16s ease;
}

.dir span{
  display:block;
  font-size:1.15rem;
  line-height:1;
}

.dir:hover{
  transform:translateY(-1px);
  color:var(--accent);
  border-color:rgba(200,168,107,.54);
  background:#FFFCF6;
}

.act{
  width:100%;
  min-height:54px;
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border-radius:16px;
  background:var(--accent);
  color:#171512;
  font-size:1.04rem;
  font-weight:860;
  box-shadow:0 18px 30px -22px rgba(168,132,69,.72);
  transition:transform .16s ease,background .16s ease,box-shadow .16s ease;
}

.act:hover{
  transform:translateY(-1px);
  background:var(--accent);
  box-shadow:0 20px 36px -22px rgba(168,132,69,.82);
}

.foot{
  flex:none;
  padding:17px 24px 22px;
  color:var(--faint);
  text-align:center;
  font-size:.84rem;
  font-weight:620;
}

@media(max-width:720px){
  .topbar{gap:12px}
  .nav{display:none}
  .brand span{font-size:1rem}
}

@media(max-width:520px){
  .topbar{padding:14px 16px}
  .ghost{min-height:36px;padding:0 14px;font-size:.86rem}
  .stage{padding:4px 16px 6px;justify-content:center}
  .hero h1{font-size:3rem}
  .sub{max-width:31ch;margin-top:11px;font-size:.98rem;line-height:1.42}
  .card{margin-top:22px;padding:16px;border-radius:21px}
  .card-head{align-items:flex-start;margin-bottom:12px}
  .badge{max-width:190px;text-align:right}
  .route{flex-direction:column;gap:10px}
  .leg{padding:12px 13px;border-radius:14px}
  .chip{margin-top:8px}
  .dir{width:40px;height:40px}
  .dir span{transform:rotate(90deg)}
  .act{min-height:50px;margin-top:14px;border-radius:14px}
  .foot{padding:12px 20px 15px}
}

@media(max-width:380px){
  .brand{gap:8px}
  .brand img{width:28px;height:28px}
  .hero h1{font-size:2.72rem}
  .sub{font-size:.94rem}
  .card{margin-top:18px;padding:14px}
  .card-head{gap:10px}
  .badge{font-size:.7rem;padding:6px 8px}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>StakeStone</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">StakeStone</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">StakeStone &mdash; 2026</footer>
</body>
</html>
